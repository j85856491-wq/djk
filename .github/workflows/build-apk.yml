name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Print Java info
        run: |
          echo "setup-java output JAVA_HOME=${{ steps.setup-java.outputs.java-home }}"
          echo "Runtime JAVA_HOME=$JAVA_HOME"
          which java || true
          java -version || true

      - name: Export JAVA_HOME
        run: |
          # Use the output from setup-java (safe at runtime) instead of the empty ${{ env.JAVA_HOME }} evaluated at workflow-parse time
          echo "JAVA_HOME=${{ steps.setup-java.outputs.java-home }}" >> $GITHUB_ENV
          export JAVA_HOME=${{ steps.setup-java.outputs.java-home }}
          echo "JAVA_HOME set to: $JAVA_HOME"
          which java
          java -version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Clean project
        run: ./gradlew clean --no-daemon -Dorg.gradle.daemon=false

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.daemon=false

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.daemon=false

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
