name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Print Java info
        run: |
          echo "setup-java output JAVA_HOME=${{ steps.setup-java.outputs.java-home }}"
          echo "Runtime JAVA_HOME=$JAVA_HOME"
          which java || true
          java -version || true

      - name: Export JAVA_HOME
        run: |
          # Use the output from setup-java (safe at runtime) instead of the empty ${{ env.JAVA_HOME }} evaluated at workflow-parse time
          echo "JAVA_HOME=${{ steps.setup-java.outputs.java-home }}" >> $GITHUB_ENV
          export JAVA_HOME=${{ steps.setup-java.outputs.java-home }}
          echo "JAVA_HOME set to: $JAVA_HOME"
          which java
          java -version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/
            ~/.gradle/wrapper/dists
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}-${{ hashFiles('**/gradle-wrapper.jar') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components & accept licenses
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          set -e
          # ensure sdkmanager exists
          if [ -x "${ANDROID_SDK_ROOT}/tools/bin/sdkmanager" ]; then
            SDKMANAGER=${ANDROID_SDK_ROOT}/tools/bin/sdkmanager
          elif [ -x "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER=${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager
          else
            echo "sdkmanager not found in expected locations; listing $ANDROID_SDK_ROOT"
            ls -la "$ANDROID_SDK_ROOT" || true
            exit 1
          fi
          echo "Using sdkmanager at: $SDKMANAGER"
          # install minimal components — adjust api level/build-tools to match your project (e.g., 33)
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          yes | "$SDKMANAGER" --licenses --sdk_root="$ANDROID_SDK_ROOT"

      - name: Export Android SDK env vars
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "PATH=${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:$PATH" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT set to ${ANDROID_SDK_ROOT}"

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Gradle diagnostics
        run: |
          ./gradlew --version || true

      - name: Create release keystore (from secret)
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "Creating release keystore from secret"
          echo "$KEYSTORE_B64" | base64 --decode > release.keystore
          ls -l release.keystore

      - name: Clean project
        run: ./gradlew clean --no-daemon -Dorg.gradle.daemon=false

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.daemon=false

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.daemon=false

      - name: Check Debug APK
        id: check-debug
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Debug APK
        if: steps.check-debug.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Check Release APK
        id: check-release
        run: |
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Release APK
        if: steps.check-release.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
